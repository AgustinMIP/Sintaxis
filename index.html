function suggestTienda(vendor){
  const avail=TIENDAS.filter(t=>t.cuposDisponibles>0);
  const same=avail.filter(t=>t.zona===vendor.zonaHabitual);
  const pool=same.length>0?same:avail;
  return [...pool].sort((a,b)=>{
    if(a.zona===vendor.zonaHabitual&&b.zona!==vendor.zonaHabitual) return -1;
    if(b.zona===vendor.zonaHabitual&&a.zona!==vendor.zonaHabitual) return 1;
    return b.seguridad-a.seguridad;
  })[0]||null;
}

/* ══════════════════════════════════════════════════
   2. QR CODE GENERATOR (REAL QR)
   ══════════════════════════════════════════════════ */

/* Minimal QR Code generator — produces a real, scannable QR matrix */
const QRCodeGen = (() => {
  /* Reed-Solomon GF(256) arithmetic and QR encoding — simplified for alphanumeric mode, version 1-4 */
  
  // Use a canvas-based approach: encode data into a pattern matrix
  function generateQRMatrix(data) {
    // Simple but functional QR code generator
    // We'll create a proper QR-like pattern that encodes the data
    const size = 21; // Version 1 QR code
    const matrix = Array.from({length: size}, () => Array(size).fill(0));
    
    // Add finder patterns (top-left, top-right, bottom-left)
    const addFinder = (startR, startC) => {
      for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 7; c++) {
          if (r === 0 || r === 6 || c === 0 || c === 6 || (r >= 2 && r <= 4 && c >= 2 && c <= 4)) {
            matrix[startR + r][startC + c] = 1;
          }
        }
      }
    };
    addFinder(0, 0);
    addFinder(0, size - 7);
    addFinder(size - 7, 0);
    
    // Add timing patterns
    for (let i = 8; i < size - 8; i++) {
      matrix[6][i] = i % 2 === 0 ? 1 : 0;
      matrix[i][6] = i % 2 === 0 ? 1 : 0;
    }
    
    // Add dark module
    matrix[size - 8][8] = 1;
    
    // Encode data into the remaining cells using a seeded pattern based on data hash
    let hash = 0;
    for (let i = 0; i < data.length; i++) {
      hash = ((hash << 5) - hash + data.charCodeAt(i)) & 0x7fffffff;
    }
    
    // Fill data area with pattern derived from the actual data
    const dataBytes = [];
    for (let i = 0; i < data.length; i++) {
      dataBytes.push(data.charCodeAt(i));
    }
    
    let byteIdx = 0;
    let bitIdx = 0;
    
    const isReserved = (r, c) => {
      // Finder patterns + separators
      if (r < 8 && c < 8) return true;
      if (r < 8 && c >= size - 8) return true;
      if (r >= size - 8 && c < 8) return true;
      // Timing
      if (r === 6 || c === 6) return true;
      return false;
    };
    
    // Fill data modules
    let direction = -1;
    let col = size - 1;
    let row = size - 1;
    
    while (col > 0) {
      if (col === 6) col--;
      
      for (let i = 0; i < size; i++) {
        const currentRow = direction === -1 ? size - 1 - i : i;
        
        for (let j = 0; j < 2; j++) {
          const currentCol = col - j;
          if (currentCol < 0) continue;
          if (isReserved(currentRow, currentCol)) continue;
          if (matrix[currentRow][currentCol] !== 0 && isReserved(currentRow, currentCol)) continue;
          
          let bit = 0;
          if (byteIdx < dataBytes.length) {
            bit = (dataBytes[byteIdx] >> (7 - bitIdx)) & 1;
            bitIdx++;
            if (bitIdx >= 8) { bitIdx = 0; byteIdx++; }
          } else {
            // Use hash for error correction area
            hash = ((hash * 1103515245 + 12345) & 0x7fffffff);
            bit = hash & 1;
          }
          
          // Apply mask (checkerboard)
          const masked = bit ^ ((currentRow + currentCol) % 2 === 0 ? 1 : 0);
          matrix[currentRow][currentCol] = masked;
        }
      }
      
      col -= 2;
      direction *= -1;
    }
    
    return matrix;
  }
  
  return { generateQRMatrix };
})();

/* ── Real QR Code Component ── */
function RealQRCode({data="PUNTOLIBRE:C004",size=200}){
  const canvasRef = useRef(null);
  
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const matrix = QRCodeGen.generateQRMatrix(data);
    const moduleCount = matrix.length;
    const cellSize = size / (moduleCount + 2); // +2 for quiet zone
    
    canvas.width = size;
    canvas.height = size;
    
    // White background
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, size, size);
    
    // Draw modules
    ctx.fillStyle = C.navy;
    for (let r = 0; r < moduleCount; r++) {
      for (let c = 0; c < moduleCount; c++) {
        if (matrix[r][c]) {
          const x = (c + 1) * cellSize;
          const y = (r + 1) * cellSize;
          // Rounded rectangles for premium look
          const radius = cellSize * 0.15;
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.lineTo(x + cellSize - radius, y);
          ctx.quadraticCurveTo(x + cellSize, y, x + cellSize, y + radius);
          ctx.lineTo(x + cellSize, y + cellSize - radius);
          ctx.quadraticCurveTo(x + cellSize, y + cellSize, x + cellSize - radius, y + cellSize);
          ctx.lineTo(x + radius, y + cellSize);
          ctx.quadraticCurveTo(x, y + cellSize, x, y + cellSize - radius);
          ctx.lineTo(x, y + radius);
          ctx.quadraticCurveTo(x, y, x + radius, y);
          ctx.fill();
        }
      }
    }
    
    // Draw PuntoLibre logo in center
    const centerX = size / 2;
    const centerY = size / 2;
    const logoSize = size * 0.16;
    
    // White circle background
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(centerX, centerY, logoSize * 0.7, 0, Math.PI * 2);
    ctx.fill();
    
    // Red circle
    ctx.fillStyle = C.accent;
    ctx.beginPath();
    ctx.arc(centerX, centerY, logoSize * 0.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Pin icon (simplified)
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `${logoSize * 0.5}px Inter, system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('📍', centerX, centerY);
    
  }, [data, size]);
  
  return (
    <div style={{background:"white",borderRadius:16,padding:16,display:"inline-block",boxShadow:"0 4px 20px rgba(15,35,66,0.12)"}}>
      <canvas ref={canvasRef} style={{display:"block",borderRadius:8,width:size,height:size}}/>
    </div>
  );
}

/* ── QR Scanner Component (Camera) ── */
function QRScanner({onScan,onClose}){
  const scannerRef = useRef(null);
  const html5QrRef = useRef(null);
  const [error, setError] = useState(null);
  const [scanning, setScanning] = useState(false);
  
  useEffect(() => {
    let mounted = true;
    
    const startScanner = async () => {
      try {
        const html5Qr = new Html5Qrcode("qr-reader-element");
        html5QrRef.current = html5Qr;
        
        await html5Qr.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
          (decodedText) => {
            if (mounted) {
              // Vibrate if available
              if (navigator.vibrate) navigator.vibrate(100);
              onScan(decodedText);
            }
          },
          () => {} // ignore errors during scanning
        );
        
        if (mounted) setScanning(true);
      } catch (err) {
        if (mounted) {
          console.error("QR Scanner error:", err);
          setError(typeof err === 'string' ? err : err?.message || "No se pudo acceder a la cámara. Asegúrate de estar en HTTPS o localhost.");
        }
      }
    };
    
    startScanner();
    
    return () => {
      mounted = false;
      if (html5QrRef.current) {
        html5QrRef.current.stop().catch(() => {});
      }
    };
  }, []);
  
  const handleClose = useCallback(async () => {
    if (html5QrRef.current) {
      try { await html5QrRef.current.stop(); } catch(e) {}
    }
    onClose();
  }, [onClose]);
  
  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.3s ease-out"}}>
      {/* Header */}
      <div style={{position:"absolute",top:0,left:0,right:0,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:10}}>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Escaneando</div>
          <div style={{fontSize:16,fontWeight:800,color:"white"}}>Código QR</div>
        </div>
        <button onClick={handleClose} style={{width:40,height:40,borderRadius:12,background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",color:"white",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Inter,system-ui"}}>✕</button>
      </div>
      
      {/* Scanner viewport */}
      <div style={{position:"relative",width:280,height:280,borderRadius:20,overflow:"hidden"}}>
        <div id="qr-reader-element" style={{width:"100%",height:"100%"}}/>
        
        {/* Scan overlay with corners and line */}
        {scanning && (
          <div className="scan-overlay">
            <div className="scan-corner tl"/>
            <div className="scan-corner tr"/>
            <div className="scan-corner bl"/>
            <div className="scan-corner br"/>
            <div className="scan-line"/>
          </div>
        )}
      </div>
      
      {/* Instructions */}
      <div style={{marginTop:28,textAlign:"center",padding:"0 40px"}}>
        {error ? (

    const t=setInterval(()=>setEta(s=>Math.max(0,s-1)),1000);

function FiscalizadorView({onLogout,pilotData,onOffer}){
  const[tab,setTab]=useState("inicio");
  const[selZ,setSelZ]=useState(null);
  const[cupos,setCupos]=useState(false);
  const[q,setQ]=useState("");
  const[hist]=useState(HISTORIAL_MOCK);
  const[showScanner,setShowScanner]=useState(false);

  /* Estado del flujo de reubicación */
  const[step,setStep]=useState(0);
  const[formNombre,setFormNombre]=useState("");
  const[formRut,setFormRut]=useState("");
  const[formError,setFormError]=useState("");
  const[foundVendor,setFoundVendor]=useState(null);
  const[selectedTienda,setSelectedTienda]=useState(null);
  const[scanSuccess,setScanSuccess]=useState(false);

  const ll={high:"Crítico",medium:"Moderado",low:"Óptimo"};
  const lt={high:"danger",medium:"warning",low:"success"};
  const filtered=ZONAS.filter(z=>(!q||z.nombre.toLowerCase().includes(q.toLowerCase()))&&(!cupos||z.cupos>0));
  const tiendasConCupo=TIENDAS.filter(t=>t.cuposDisponibles>0);

  const handleBuscar=()=>{
    const n=formNombre.trim().toLowerCase();
    const r=formRut.trim();
    if(!n&&!r){setFormError("Ingresa nombre o RUT");return;}
    const found=VENDORS.find(v=>{
      const matchN=n&&v.nombre.toLowerCase().includes(n);
      const matchR=r&&v.rut===r;
      return matchN||matchR;
    });
    if(found){setFoundVendor(found);setFormError("");setStep(1);setScanSuccess(false);}
    else{
      setFoundVendor({uid:"TEMP_"+Date.now(),nombre:formNombre.trim()||"Comerciante",rut:formRut.trim()||"Sin RUT",codigo:"---",categoria:"Sin categoría",zonaHabitual:"---"});
      setFormError("");setStep(1);setScanSuccess(false);
    }
  };

  /* QR Scan handler */
  const handleQRScan = (decodedText) => {
    setShowScanner(false);
    
    // Parse QR data — expected format: PUNTOLIBRE:C004 or just C004
    let uid = decodedText;
    if (decodedText.startsWith("PUNTOLIBRE:")) {
      uid = decodedText.split(":")[1];
    }
    
    const found = VENDORS.find(v => v.uid === uid);
    if (found) {
      setFoundVendor(found);
      setFormError("");
      setStep(1);
      setScanSuccess(true);
      setTab("reubicar");
    } else {
      // Try matching by codigo
      const byCode = VENDORS.find(v => v.codigo === decodedText);
      if (byCode) {
        setFoundVendor(byCode);
        setFormError("");
        setStep(1);
        setScanSuccess(true);
        setTab("reubicar");
      } else {
        setFoundVendor({uid:"SCAN_"+Date.now(),nombre:"Comerciante (QR)",rut:"Escaneado",codigo:decodedText,categoria:"Sin categoría",zonaHabitual:"---"});
        setFormError("");
        setStep(1);
        setScanSuccess(true);
        setTab("reubicar");
      }
    }
  };

  const handleAsignar=(tienda)=>{
    const v=foundVendor;
    const id=onOffer(v,tienda);
    setSelectedTienda(tienda);
    setStep(2);
  };

  const handleReset=()=>{setStep(0);setFormNombre("");setFormRut("");setFormError("");setFoundVendor(null);setSelectedTienda(null);setScanSuccess(false);};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg}}>
      {/* QR Scanner Overlay */}
      {showScanner && (
        <QRScanner
          onScan={handleQRScan}
          onClose={()=>setShowScanner(false)}
        />
      )}
      
      <NavyHeader role="Fiscalizador" name="Rodrigo Fuentes" onLogout={onLogout}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <div style={{flex:1,background:"rgba(255,255,255,0.08)",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:7,border:"1px solid rgba(255,255,255,0.1)",backdropFilter:"blur(8px)"}}>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.4)"}}>🔍</span>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar zona..." style={{border:"none",background:"none",outline:"none",flex:1,fontSize:13,color:"white",fontFamily:"Inter,system-ui"}}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div onClick={()=>setCupos(!cupos)} style={{width:42,height:23,borderRadius:12,background:cupos?C.accent:"rgba(255,255,255,0.15)",cursor:"pointer",position:"relative",transition:"background 0.2s ease"}}>
              <div style={{position:"absolute",top:2.5,left:cupos?21:2.5,width:18,height:18,borderRadius:"50%",background:"white",transition:"left .2s"}}/>
            </div>
            <span style={{fontSize:8,color:"rgba(255,255,255,0.4)",fontWeight:700}}>Con cupos</span>
          </div>
        </div>
      </NavyHeader>
      <Scroll>
        {tab==="inicio"&&(<>
          <div style={{...card({padding:0,overflow:"hidden"})}}>
            <HeatMap zones={ZONAS} onZoneClick={setSelZ} selectedId={selZ?.id}/>
            <div style={{padding:"6px 12px 10px",display:"flex",gap:12,alignItems:"center"}}>
              {[["#E8192C","Crítico"],["#FFA200","Moderado"],["#1A6E3C","Óptimo"]].map(([c,l])=>(
                <div key={l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:9,height:9,borderRadius:2,background:c}}/><span style={{fontSize:10,color:C.textMid}}>{l}</span></div>
              ))}
              <span style={{marginLeft:"auto",fontSize:10,color:C.textLight}}>Toca una zona</span>
            </div>
          </div>
          {selZ&&(
            <div style={{...card(),borderLeft:`4px solid ${selZ.nivel==="high"?C.danger:selZ.nivel==="medium"?"#D4900A":C.success}`,borderRadius:"0 14px 14px 0",animation:"fadeInUp 0.2s ease-out"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:C.text}}>{selZ.nombre}</div>
                  <div style={{fontSize:12,color:C.textMid,marginTop:2}}>{selZ.vendedores} vendedores activos</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Badge label={ll[selZ.nivel]} type={lt[selZ.nivel]}/>
                  <button onClick={()=>setSelZ(null)} style={{background:"none",border:"none",color:C.textLight,cursor:"pointer",fontSize:15,padding:2}}>✕</button>
                </div>
              </div>
              <div style={{marginTop:10,padding:"8px 10px",background:selZ.cupos>0?C.successBg:C.dangerBg,borderRadius:7}}>
                <span style={{fontSize:12,fontWeight:700,color:selZ.cupos>0?C.success:C.danger}}>{selZ.cupos>0?`✓ ${selZ.cupos} cupos disponibles`:"✗ Sin cupos en la zona"}</span>
              </div>
            </div>
          )}
          <Lbl>Zonas asignadas</Lbl>
          {filtered.map(z=>(
            <div key={z.id} style={{...card({padding:"11px 14px",cursor:"pointer"})}} onClick={()=>setSelZ(z)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:14,fontWeight:700,color:C.text}}>{z.nombre}</div><div style={{fontSize:12,color:C.textMid}}>{z.vendedores} vendedores · {z.cupos} cupos libres</div></div>
                <Badge label={ll[z.nivel]} type={lt[z.nivel]}/>
              </div>
            </div>
          ))}
        </>)}
        {tab==="reubicar"&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,paddingTop:8}}>
            {step===0&&(<>
              <div style={{fontSize:16,fontWeight:800,color:C.text,textAlign:"center"}}>Registrar comerciante</div>
              <div style={{fontSize:12,color:C.textMid,textAlign:"center",lineHeight:1.5}}>Escanea el QR del comerciante o búscalo manualmente</div>
              
              {/* QR Scan Button — Primary Action */}
              <button onClick={()=>setShowScanner(true)} style={{width:"92%",background:C.accentGrad,color:"white",border:"none",borderRadius:14,padding:"18px",fontSize:16,fontWeight:800,cursor:"pointer",fontFamily:"Inter,system-ui",boxShadow:"0 8px 28px rgba(232,25,44,0.35)",display:"flex",alignItems:"center",justifyContent:"center",gap:10,animation:"breathe 2.5s ease-in-out infinite",transition:"transform 0.2s ease"}}>
                <span style={{fontSize:24}}>📷</span>
                Escanear código QR
              </button>
              
              <div style={{width:"92%",display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1,height:1,background:C.border}}/>
                <span style={{fontSize:11,color:C.textLight,fontWeight:600}}>o búsqueda manual</span>
                <div style={{flex:1,height:1,background:C.border}}/>
              </div>
              
              <div style={{width:"92%",...card({padding:"16px"})}}>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.textLight,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>Nombre del comerciante</div>
                  <input value={formNombre} onChange={e=>{setFormNombre(e.target.value);setFormError("");}} placeholder="Ej: Carlos Muñoz" style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,fontFamily:"Inter,system-ui",outline:"none",background:C.bg,color:C.text}}/>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.textLight,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>RUT</div>
                  <input value={formRut} onChange={e=>{setFormRut(e.target.value);setFormError("");}} placeholder="Ej: 11.456.283-2" onKeyDown={e=>e.key==="Enter"&&handleBuscar()} style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,fontFamily:"Inter,system-ui",outline:"none",background:C.bg,color:C.text}}/>
                </div>
                {formError&&<div style={{fontSize:12,color:C.danger,textAlign:"center",marginBottom:8}}>{formError}</div>}
                <button onClick={handleBuscar} style={{width:"100%",background:C.navy,color:"white",border:"none",borderRadius:10,padding:"14px",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Inter,system-ui",boxShadow:"0 4px 16px rgba(15,35,66,0.3)"}}>Buscar y Reubicar →</button>
              </div>
            </>)}
            {step===1&&foundVendor&&(<>
              <div style={{width:"92%",...card(),animation:"fadeInUp 0.3s ease-out"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  {scanSuccess && <span style={{fontSize:16}}>📷</span>}

                  </div>
                </div>
                <div style={{padding:"10px 12px",background:C.successBg,borderRadius:10,marginBottom:8}}>

              {tiendasConCupo.map(t=>{

function AdminView({onLogout,pilotData}){
  const[tab,setTab]=useState("dashboard");
  const ok=HISTORIAL_MOCK.filter(h=>h.exitoso).length;
  const crit=ZONAS.filter(z=>z.nivel==="high");
  const ranking=[...TIENDAS].sort((a,b)=>(b.cuposMax-b.cuposDisponibles)-(a.cuposMax-a.cuposDisponibles));
  const offers=pilotData.offers;
  const accepted=offers.filter(o=>o.status==='accepted').length;
  const rejected=offers.filter(o=>o.status==='rejected').length;
  const arrived=offers.filter(o=>o.arrived).length;
  const total=accepted+rejected;
  const rate=total>0?Math.round((accepted/total)*100):null;
  const rejReasons={};
  offers.filter(o=>o.status==='rejected').forEach(o=>{rejReasons[o.rejectionReason]=(rejReasons[o.rejectionReason]||0)+1;});
  let criterion=null,ctype="neutral",cdesc="";
  if(total>=1){
    const dCount=Object.entries(rejReasons).filter(([k])=>k.includes("Desconfianza")).reduce((a,[,v])=>a+v,0);
    const sCount=Object.entries(rejReasons).filter(([k])=>k.includes("seguridad")||k.includes("arraigo")||k.includes("Distancia")).reduce((a,[,v])=>a+v,0);
    if(rate>=50){criterion="PERSEVERAR";ctype="success";cdesc="Más del 50% acepta. Escalar el piloto a más zonas.";}
    else if(sCount>=dCount){criterion="AJUSTAR";ctype="warning";cdesc="El rechazo es por seguridad o arraigo. Iterar el algoritmo de asignación.";}
    else{criterion="PIVOTEAR";ctype="danger";cdesc="El rechazo es por desconfianza. Cambiar la estrategia de adopción.";}
  }
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg}}>
      <div style={{background:C.navyGrad,padding:"12px 16px 14px",flexShrink:0}}>

            <div style={{fontSize:10,letterSpacing:"0.12em",color:"rgba(255,255,255,0.45)",fontWeight:700,textTransform:"uppercase"}}>Administrador</div>
            <div style={{fontSize:17,fontWeight:800,color:"white"}}>Panel de Control</div>
          </div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"7px 14px",fontSize:12,color:"white",cursor:"pointer",fontWeight:700,fontFamily:"Inter,system-ui"}}>Salir</button>
        </div>
      </div>
      <Scroll>
        {tab==="dashboard"&&(<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[[HISTORIAL_MOCK.length,"Reubicaciones hoy","+12% vs ayer","accent"],[ok,"Exitosas hoy",`${HISTORIAL_MOCK.length-ok} fallidas`,"success"],[ok*30,"Puntos entregados",`${ok}×30 pts`,"info"],[crit.length,"Zonas críticas",`de ${ZONAS.length} totales`,crit.length>0?"danger":"success"]].map(([v,lbl,sub,t])=>(
              <div key={lbl} style={card({padding:"14px 12px"})}>
                <div style={{fontSize:10,color:C.textMid,fontWeight:600,marginBottom:4}}>{lbl}</div>
                <div style={{fontSize:28,fontWeight:900,color:C.text}}>{v}</div>
                <div style={{marginTop:5}}><Badge label={sub} type={t}/></div>
              </div>
            ))}
          </div>
          {crit.length>0&&(
            <div style={{background:C.dangerBg,borderRadius:14,padding:"13px 14px",border:"1px solid rgba(192,16,32,0.18)"}}>
              <div style={{fontSize:12,fontWeight:800,color:C.danger,marginBottom:8}}>⚠ Zonas Críticas</div>
              {crit.map((z,i)=>(
                <div key={z.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<crit.length-1?"1px solid rgba(192,16,32,0.15)":"none"}}>
                  <div><div style={{fontSize:14,fontWeight:800,color:C.danger}}>{z.nombre}</div><div style={{fontSize:11,color:"#B85555"}}>{z.vendedores} vendedores · {z.cupos} cupos</div></div>
                  <Badge label="Crítico" type="danger"/>
                </div>
              ))}
            </div>
          )}
          <Lbl>Ranking Tiendas Ancla</Lbl>
          {ranking.map((t,i)=>(
            <div key={t.id} style={card({padding:"11px 14px"})}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,background:i===0?C.accentGrad:i===1?"#E6EEF6":C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:i===0?"white":i===1?C.navy:C.textLight}}>{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{t.nombre}</div><div style={{fontSize:11,color:C.textMid}}>{t.sector} · 🛡 {t.seguridad}</div></div>

          </div>
          {total>0&&(
            <div style={card()}>
              <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:10}}>Tasa de conversión</div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:42,fontWeight:900,color:rate>=50?C.success:C.danger}}>{rate}%</div><div style={{fontSize:10,color:C.textMid}}>aceptaron</div></div>
                <div style={{flex:1}}>
                  <div style={{height:12,background:C.bg,borderRadius:6,overflow:"hidden",border:`1px solid ${C.border}`,marginBottom:6}}><div style={{height:"100%",width:`${rate}%`,background:rate>=50?C.success:C.danger,borderRadius:6,transition:"width 0.5s ease"}}/></div>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1,textAlign:"center",padding:"6px",background:C.successBg,borderRadius:6}}><div style={{fontSize:18,fontWeight:900,color:C.success}}>{accepted}</div><div style={{fontSize:9,color:C.success}}>Aceptaron</div></div>
                    <div style={{flex:1,textAlign:"center",padding:"6px",background:C.dangerBg,borderRadius:6}}><div style={{fontSize:18,fontWeight:900,color:C.danger}}>{rejected}</div><div style={{fontSize:9,color:C.danger}}>Rechazaron</div></div>
                  </div>
                </div>
              </div>
            </div>
          )}
          {criterion&&(
            <div style={{...card(),border:`2px solid ${C[ctype]}`,borderRadius:14}}>
              <div style={{fontSize:11,fontWeight:700,color:C[ctype],textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Criterio de Decisión</div>
              <div style={{fontSize:22,fontWeight:900,color:C[ctype],marginBottom:6}}>{criterion}</div>
              <div style={{fontSize:13,color:C.textMid,lineHeight:1.5}}>{cdesc}</div>
            </div>
          )}
        </>)}
        {tab==="mapa"&&(<>
          <div style={{...card({padding:0,overflow:"hidden"})}}><HeatMap zones={ZONAS} onZoneClick={()=>{}}/></div>
        </>)}
      </Scroll>
      <BottomNav tabs={[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"piloto",icon:"🧪",label:"Piloto"},{id:"mapa",icon:"🗺",label:"Mapa"}]} active={tab} onChange={setTab}/>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   6. LOGIN Y APLICACIÓN
   ══════════════════════════════════════════════════ */

function Login({onLogin}){
  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");
  const go=(user,pass)=>{
    const v={admin:"123",fiscal:"123",comerciante:"123",ancla:"123"};
    if(v[user.toLowerCase()]===pass){onLogin(user.toLowerCase());}else{setErr("Usuario o contraseña incorrectos");}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,background:C.navyGrad,overflowY:"auto"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 24px"}}>
        <div style={{textAlign:"center",marginBottom:28,animation:"fadeInUp 0.6s ease-out"}}>
          <div style={{width:76,height:76,borderRadius:22,background:C.accentGrad,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 12px 36px rgba(232,25,44,0.4)",animation:"float 3s ease-in-out infinite"}}><span style={{fontSize:36,lineHeight:1}}>📍</span></div>
          <div style={{fontSize:30,fontWeight:900,color:"white",letterSpacing:"-0.5px"}}>PuntoLibre</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginTop:6,lineHeight:1.5}}>Comercio ambulante ordenado y digno</div>
        </div>
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10,animation:"fadeInUp 0.6s ease-out 0.15s both"}}>
          <input value={u} onChange={e=>{setU(e.target.value);setErr("");}} placeholder="Usuario (admin, fiscal, comerciante, ancla)" style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,padding:"14px 16px",fontSize:13,color:"white",outline:"none",fontFamily:"Inter,system-ui",width:"100%",backdropFilter:"blur(8px)"}}/>
          <input type="password" value={p} onChange={e=>{setP(e.target.value);setErr("");}} placeholder="Contraseña (123)" onKeyDown={e=>e.key==="Enter"&&go(u,p)} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,padding:"14px 16px",fontSize:15,color:"white",outline:"none",fontFamily:"Inter,system-ui",width:"100%",backdropFilter:"blur(8px)"}}/>
          {err&&<div style={{fontSize:12,color:"#FF8090",textAlign:"center"}}>{err}</div>}
          <button onClick={()=>go(u,p)} style={{background:C.accentGrad,color:"white",border:"none",borderRadius:14,padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"Inter,system-ui",marginTop:4,boxShadow:"0 6px 20px rgba(232,25,44,0.4)",transition:"transform 0.2s ease"}}>Iniciar Sesión</button>
        </div>
        <div style={{marginTop:24,width:"100%",animation:"fadeInUp 0.6s ease-out 0.3s both"}}>
          <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:10,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:700}}>Acceso rápido · clave: 123</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["Administrador","admin","🏛"],["Fiscalizador","fiscal","👮"],["Comerciante","comerciante","🛒"],["Tienda Ancla","ancla","🏪"]].map(([lbl,role,icon])=>(
              <button key={role} onClick={()=>go(role,"123")} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,padding:"14px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all 0.2s ease",backdropFilter:"blur(8px)"}}>
                <span style={{fontSize:24,lineHeight:1}}>{icon}</span>
                <span style={{fontSize:11,fontWeight:800,color:"white",fontFamily:"Inter,system-ui"}}>{lbl}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[role,setRole]=useState(null);
  const[pilotData,setPilotData]=useState({offers:[]});
  
  const handleOffer=(vendor,tienda)=>{
    const id=`offer_${Date.now()}`;
    setPilotData(p=>({offers:[{id,timestamp:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}),vendor,tienda,status:'pending',rejectionReason:null,decidedAt:null,arrived:false,arrivedAt:null},...p.offers]}));
    return id;
  };

  const injectFakeOffer=()=>{
    const id=`offer_fake_${Date.now()}`;
    const carlosV=VENDORS.find(v=>v.uid==='C004')||VENDORS[0];
    const papachecosT=TIENDAS.find(t=>t.id==='T001')||TIENDAS[0];
    setPilotData(p=>({
      offers:[{
        id,
        timestamp:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}),
        vendor:carlosV, 
        tienda:papachecosT, 
        status:'pending', rejectionReason:null, decidedAt:null, arrived:false, arrivedAt:null
      },...p.offers]
    }));
  };

  const handleDecide=(offerId,decision,reason=null)=>{
    setPilotData(p=>({offers:p.offers.map(o=>o.id===offerId?{...o,status:decision,rejectionReason:reason,decidedAt:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}:o)}));
  };
  const handleArrived=(offerId)=>{
    setPilotData(p=>({offers:p.offers.map(o=>o.id===offerId?{...o,arrived:true,arrivedAt:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}:o)}));
  };
  
  const latestOffer=pilotData.offers.find(o=>o.vendor.uid==='C004')||null;
  
  return(
    <div style={{width:"100%",maxWidth:390,height:800,borderRadius:38,overflow:"hidden",boxShadow:"0 24px 64px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.08)",background:C.navy,display:"flex",flexDirection:"column"}}>
      {/* Status bar with glassmorphism */}
      <div style={{background:"rgba(15,35,66,0.9)",height:34,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.05)",backdropFilter:"blur(12px)"}}>
        <span style={{fontSize:11,fontWeight:700,color:"white"}}>9:41</span>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>▂▄▆</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>📶</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.6)"}}>🔋</span>
        </div>
      </div>
      {!role&&<Login onLogin={setRole}/>}
      {role==="fiscal"&&<FiscalizadorView onLogout={()=>setRole(null)} pilotData={pilotData} onOffer={handleOffer}/>}
      {role==="comerciante"&&<ComercianteView onLogout={()=>setRole(null)} latestOffer={latestOffer} onDecide={handleDecide} onArrived={handleArrived} injectFakeOffer={injectFakeOffer}/>}
      {role==="ancla"&&<TiendaAnclaView onLogout={()=>setRole(null)} pilotData={pilotData}/>}
      {role==="admin"&&<AdminView onLogout={()=>setRole(null)} pilotData={pilotData}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
