<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PuntoLibre — MVP Operativo Completo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#D6DBE4;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 16px 48px;font-family:system-ui,-apple-system,sans-serif;}
  .topbar{width:100%;max-width:390px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
  .topbar h1{font-size:15px;font-weight:800;color:#1A2E4A;}
  .topbar .pill{background:rgba(232,25,44,0.12);color:#B5101E;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
  .hint{width:100%;max-width:390px;text-align:center;font-size:11px;color:#7A90A8;margin-top:14px;line-height:1.6;}
  input::placeholder{color:rgba(255,255,255,0.35);}
  @keyframes drawRoute{from{stroke-dashoffset:380}to{stroke-dashoffset:0}}
  @keyframes pulseDot{0%,100%{opacity:.2}50%{opacity:.55}}
  @keyframes successPop{0%{transform:scale(0);opacity:0}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  
  #reader__dashboard_section_csr span { color: white !important; font-family: system-ui; }
  #reader__dashboard_section_csr button { padding: 8px !important; border-radius: 8px !important; }
</style>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="topbar">
  <h1>📍 PuntoLibre</h1>
  <span class="pill">MVP Ecosistema</span>
</div>
<div id="root" style="width:100%;max-width:390px;"></div>
<p class="hint">
  <strong>Magia:</strong> Tocar el nombre del comerciante simula recepción de oferta<br>
  Acceso rápido: <strong>123</strong>
</p>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect} = React;

const C = {
  bg:"#EEF1F6",surface:"#FFFFFF",
  navy:"#0F2342",navyMid:"#1A3A5C",
  accent:"#E8192C",accentLight:"#FDEAEC",accentDark:"#B5101E",
  text:"#0F1E30",textMid:"#4A6078",textLight:"#8AA0B5",
  border:"rgba(15,35,66,0.10)",
  success:"#1A6E3C",successBg:"#E6F4ED",
  warning:"#7A4F00",warningBg:"#FFF4DC",
  danger:"#C01020",dangerBg:"#FDEAEC",
  info:"#0B5299",infoBg:"#E5F0FB",
};

const ZONAS=[
  {id:"z1",nombre:"La Vega",nivel:"high",vendedores:47,cupos:3,x:110,y:72,w:92,h:58},
  {id:"z2",nombre:"Baquedano",nivel:"high",vendedores:38,cupos:0,x:202,y:150,w:84,h:52},
  {id:"z3",nombre:"Alameda Ctr",nivel:"medium",vendedores:22,cupos:8,x:52,y:162,w:104,h:48},
];

/* AQUÍ ESTÁ TU BASE DE DATOS INTEGRADA */
const TIENDAS=[
  {id:"T001", nombre:"Papachecos", direccion:"José Victorino Lastarria 160", horario:"12:00 - 22:00", zona:"Baquedano", cuposMax:2, cuposDisponibles:2, x:202, y:150, rating:4.8, seguridad:4.7, dist:"120m", amenidades:["🚿 Baño","🛡 Guardia"]},
  {id:"T002", nombre:"GMO", direccion:"Paseo Ahumada 99", horario:"08:30 - 21:00", zona:"Alameda Ctr", cuposMax:4, cuposDisponibles:4, x:52, y:162, rating:4.5, seguridad:4.2, dist:"350m", amenidades:["📦 Bodega","📶 Wi-Fi"]},
  {id:"T003", nombre:"Las Dalias", direccion:"Av. B. O'Higgins 620", horario:"11:00 - 20:00", zona:"Alameda Ctr", cuposMax:5, cuposDisponibles:5, x:95, y:175, rating:4.6, seguridad:4.5, dist:"620m", amenidades:["🚿 Baño","📦 Bodega","🛡 Guardia"]}
];

const VENDORS=[
  {uid:"v1",nombre:"Carlos Muñoz",rut:"12.345.678-9",codigo:"CM-04821",arrival:"08:30",horasActivo:"5h 20m",categoria:"Ropa",zonaHabitual:"Alameda Ctr"},
];

const HISTORIAL_MOCK=[{id:"h1",nombre:"Carlos Muñoz",rut:"12.345.678-9",time:"11:42",exitoso:true,destino:"Baquedano"}];

const REJ=[
  {id:"seg",reason:"Falta de seguridad",label:"Sin\nseguridad",col:"#8B2020",bg:"#FDEAEC", Icon:({c})=><svg viewBox="0 0 48 48" width="100%" height="100%"><path d="M24,4 L40,10 L40,26 Q24,44 24,44 Q8,30 8,26 L8,10 Z" fill={c} opacity=".15"/><path d="M24,4 L40,10 L40,26 Q24,44 24,44 Q8,30 8,26 L8,10 Z" fill="none" stroke={c} strokeWidth="2.5"/><text x="24" y="33" textAnchor="middle" fontSize="22" fontWeight="900" fill={c} fontFamily="system-ui,sans-serif">!</text></svg>},
  {id:"arr",reason:"Arraigo territorial",label:"Mi\nzona",col:"#7A5800",bg:"#FFF4DC", Icon:({c})=><svg viewBox="0 0 48 48" width="100%" height="100%"><polygon points="24,5 40,22 8,22" fill={c} opacity=".75"/><rect x="12" y="22" width="24" height="20" rx="2" fill={c} opacity=".45"/><circle cx="24" cy="31" r="4.5" fill={c} opacity=".9"/></svg>},
];

function suggestTienda(vendor){
  const avail=TIENDAS.filter(t=>t.cuposDisponibles>0);
  const same=avail.filter(t=>t.zona===vendor.zonaHabitual);
  const pool=same.length>0?same:avail;
  return [...pool].sort((a,b)=>b.seguridad-a.seguridad)[0]||null;
}

function card(ex={}){return{background:C.surface,borderRadius:12,padding:"13px 15px",boxShadow:"0 1px 8px rgba(15,35,66,0.09)",border:`1px solid ${C.border}`,...ex};}
function Badge({label,type="info"}){
  const m={success:[C.successBg,C.success],warning:[C.warningBg,C.warning],danger:[C.dangerBg,C.danger],info:[C.infoBg,C.info],accent:[C.accentLight,C.accentDark],neutral:["#E8EDF3",C.textMid],navy:["rgba(15,35,66,0.12)",C.navy]};
  const[bg,col]=m[type]||m.info;
  return <span style={{background:bg,color:col,fontSize:11,fontWeight:700,borderRadius:5,padding:"3px 8px",whiteSpace:"nowrap"}}>{label}</span>;
}
function StarRating({value,max=5}){
  return <span style={{fontSize:11,color:C.warning,fontWeight:700}}>{"★".repeat(Math.round(value))}{"☆".repeat(max-Math.round(value))} {value.toFixed(1)}</span>;
}
function BottomNav({tabs,active,onChange}){
  return(
    <div style={{background:C.navy,display:"flex",padding:"8px 0 14px",flexShrink:0}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0"}}>
          <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
          <span style={{fontSize:10,fontWeight:active===t.id?700:400,color:active===t.id?C.accent:"rgba(255,255,255,0.5)"}}>{t.label}</span>
          {active===t.id&&<div style={{width:20,height:2.5,borderRadius:2,background:C.accent}}/>}
        </button>
      ))}
    </div>
  );
}
function NavyHeader({role,name,onLogout,children,onSecretTap}){
  return(
    <div style={{background:C.navy,padding:"14px 16px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:children?10:0}}>
        <div>
          <div style={{fontSize:10,letterSpacing:"0.1em",color:"rgba(255,255,255,0.5)",fontWeight:700,textTransform:"uppercase"}}>{role}</div>
          <div style={{fontSize:17,fontWeight:800,color:"white",cursor:onSecretTap?"pointer":"default"}} onClick={onSecretTap ? onSecretTap : undefined}>{name}</div>
        </div>
        <button onClick={onLogout} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",fontSize:12,color:"white",cursor:"pointer",fontWeight:700}}>Salir</button>
      </div>
      {children}
    </div>
  );
}
function Scroll({children}){return <div style={{flex:1,overflowY:"auto",padding:"12px 15px",display:"flex",flexDirection:"column",gap:10,background:C.bg}}>{children}</div>;}
function Lbl({children}){return <div style={{fontSize:10,fontWeight:700,color:C.textLight,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:2}}>{children}</div>;}

function TiendaSuggestionCard({tienda,vendor,onOffer,onSkip}){
  return(
    <div style={{...card(),border:`1.5px solid ${C.success}`}}>
      <div style={{fontSize:11,fontWeight:700,color:C.success,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>📍 Punto sugerido</div>
      <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:2}}>{tienda.nombre}</div>
      <div style={{fontSize:12,color:C.textMid,marginBottom:4}}>{tienda.direccion}</div>
      <div style={{fontSize:11,color:C.textMid,marginBottom:8}}>🕒 {tienda.horario}</div>
      <div style={{display:"flex",gap:10,marginBottom:10,alignItems:"center"}}>
        <div><span style={{fontSize:10,color:C.textLight,fontWeight:600}}>Seguridad</span><br/><StarRating value={tienda.seguridad}/></div>
        <div style={{width:1,height:28,background:C.border}}/>
        <div><span style={{fontSize:10,color:C.textLight,fontWeight:600}}>Cupos</span><br/><span style={{fontSize:13,fontWeight:800,color:C.success}}>{tienda.cuposDisponibles}/{tienda.cuposMax}</span></div>
      </div>
      <button onClick={onOffer} style={{width:"100%",background:C.accent,color:"white",border:"none",borderRadius:9,padding:"12px",fontSize:13,fontWeight:800,cursor:"pointer"}}>Ofrecer punto →</button>
    </div>
  );
}

function Scanner({ onScan }){
  useEffect(()=>{
    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, false);
    scanner.render((textoQR)=>{ scanner.clear(); onScan(textoQR); }, (error)=>{});
    return ()=> { scanner.clear().catch(e=>console.log(e)); };
  },[]);
  return <div id="reader" style={{width:"100%", background:"white", borderRadius:10, overflow:"hidden", border:"none"}}></div>;
}

function ComercianteView({onLogout,latestOffer,onDecide, injectFakeOffer}){
  const pct=(145/200)*100;
  const isAccepted=latestOffer&&latestOffer.status==='accepted';
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg}}>
      <NavyHeader role="Comerciante" name="Carlos Muñoz" onLogout={onLogout} onSecretTap={injectFakeOffer}>
         <div style={{height:6,background:"rgba(255,255,255,0.18)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:C.accent,borderRadius:3}}/></div>
      </NavyHeader>
      <Scroll>
        {isAccepted && (
          <div style={{...card(),border:`1.5px solid ${C.success}`,background:C.successBg}}>
            <div style={{fontWeight:800,color:C.success}}>✓ Asignado a: {latestOffer.tienda.nombre}</div>
            <div style={{fontSize:12,color:C.textMid}}>{latestOffer.tienda.direccion}</div>
          </div>
        )}
        <div style={{...card({display:"flex",flexDirection:"column",alignItems:"center"})}}>
          <img src="qr-code.png" width="180" height="180" alt="QR" />
          <div style={{fontSize:20,fontWeight:900,color:C.navy,marginTop:10}}>CM-04821</div>
        </div>
      </Scroll>
      <BottomNav tabs={[{id:"qr",icon:"▣",label:"Mi QR"}]} active="qr"/>
    </div>
  );
}

function FiscalizadorView({onLogout,pilotData,onOffer}){
  const[step,setStep]=useState(0);
  const[currentOfferId,setCurrentOfferId]=useState(null);
  const handleScan=()=>{if(step===0) setStep(1);};
  const handleScanSuccess = (textoQR) => { setStep(2); };
  const handleOffer=()=>{const id=onOffer(VENDORS[0],TIENDAS[0]);setCurrentOfferId(id);setStep(3);};
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg}}>
      <NavyHeader role="Fiscalizador" name="Rodrigo Fuentes" onLogout={onLogout} />
      <Scroll>
        {step===0 && <button onClick={handleScan} style={{padding:20,background:C.navy,color:"white",borderRadius:12,border:"none"}}>Escanear QR</button>}
        {step===1 && <Scanner onScan={handleScanSuccess} />}
        {step===2 && <TiendaSuggestionCard tienda={TIENDAS[0]} vendor={VENDORS[0]} onOffer={handleOffer} onSkip={()=>{}}/>}
        {step===3 && <div style={card()}>Oferta Enviada</div>}
      </Scroll>
    </div>
  );
}

function TiendaAnclaView({onLogout}){
  const myStore = TIENDAS[0];
  const[cupos,setCupos]=useState(myStore.cuposDisponibles);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg}}>
      <NavyHeader role="Tienda Ancla" name={myStore.nombre} onLogout={onLogout} />
      <Scroll>
        <div style={card()}>
          <div style={{fontSize:12}}>Cupos: {cupos} / {myStore.cuposMax}</div>
          <button onClick={()=>setCupos(cupos-1)} style={{padding:10}}>Reducir Cupo</button>
        </div>
      </Scroll>
    </div>
  );
}

function App(){
  const[role,setRole]=useState(null);
  const[pilotData,setPilotData]=useState({offers:[]});
  const handleOffer=(v,t)=>{const id=`o_${Date.now()}`; setPilotData({offers:[{id,vendor:v,tienda:t,status:'pending'}]}); return id;};
  const handleDecide=(id,dec)=>{setPilotData({offers:pilotData.offers.map(o=>o.id===id?{...o,status:dec}:o)});};
  const handleArrived=(id)=>{};
  const injectFakeOffer=()=>{setPilotData({offers:[{id:'fake',vendor:VENDORS[0],tienda:TIENDAS[0],status:'pending'}]});};
  const latestOffer=pilotData.offers[0]||null;
  
  return(
    <div style={{width:"100%",maxWidth:390,height:800,borderRadius:38,overflow:"hidden",background:C.navy}}>
      {!role&&<div style={{padding:50}}><button onClick={()=>setRole('fiscal')} style={{width:"100%",padding:10,marginBottom:10}}>Fiscalizador</button><button onClick={()=>setRole('comerciante')} style={{width:"100%",padding:10,marginBottom:10}}>Comerciante</button><button onClick={()=>setRole('ancla')} style={{width:"100%",padding:10}}>Tienda Ancla</button></div>}
      {role==="fiscal"&&<FiscalizadorView onLogout={()=>setRole(null)} pilotData={pilotData} onOffer={handleOffer}/>}
      {role==="comerciante"&&<ComercianteView onLogout={()=>setRole(null)} latestOffer={latestOffer} onDecide={handleDecide} onArrived={handleArrived} injectFakeOffer={injectFakeOffer}/>}
      {role==="ancla"&&<TiendaAnclaView onLogout={()=>setRole(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
