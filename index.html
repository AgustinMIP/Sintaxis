function suggestTienda(vendor){
  const avail=TIENDAS.filter(t=>t.cuposDisponibles>0);
  const same=avail.filter(t=>t.zona===vendor.zonaHabitual);
  const pool=same.length>0?same:avail;
  return [...pool].sort((a,b)=>b.seguridad-a.seguridad)[0]||null;
}

function QRCode({size=180,id="CM-04821"}){
  const cols=21;let seed=id.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const rand=()=>{seed=(seed*1664525+1013904223)&0x7fffffff;return seed/0x7fffffff;};
  const cell=size/cols;
  const cells=Array.from({length:cols*cols},(_,i)=>{
    const r=Math.floor(i/cols),c=i%cols;
    const inC=(r<7&&c<7)||(r<7&&c>=cols-7)||(r>=cols-7&&c<7);
    if(inC){const rr=r<7?r:r-(cols-7),cc=c<7?c:c-(cols-7);return(rr===0||rr===6||cc===0||cc===6)||(rr>=2&&rr<=4&&cc>=2&&cc<=4);}
    return rand()>0.48;
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:"block"}}>
      {cells.map((f,i)=>{const r=Math.floor(i/cols),c=i%cols;return f?<rect key={i} x={c*cell+.5} y={r*cell+.5} width={cell-1} height={cell-1} fill={C.navy} rx={.8}/>:null;})}
    </svg>
  );
}

function Scanner({ onScan }){
  useEffect(()=>{
    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, false);
    scanner.render((textoQR)=>{ scanner.clear(); onScan(textoQR); }, (error)=>{});
    return ()=> { scanner.clear().catch(e=>console.log(e)); };
  },[]);
  return <div id="reader" style={{width:"100%", background:"white", borderRadius:10, overflow:"hidden", border:"none"}}></div>;
}

function AdminView({onLogout,pilotData}){
  const[tab,setTab]=useState("dashboard");
  const ok=HISTORIAL_MOCK.filter(h=>h.exitoso).length;
  const crit=ZONAS.filter(z=>z.nivel==="high");
  const ranking=[...TIENDAS].sort((a,b)=>(b.cuposMax-b.cuposDisponibles)-(a.cuposMax-a.cuposDisponibles));
  const offers=pilotData.offers;
  const accepted=offers.filter(o=>o.status==='accepted').length;
  const rejected=offers.filter(o=>o.status==='rejected').length;
  const arrived=offers.filter(o=>o.arrived).length;
  const total=accepted+rejected;
  const rate=total>0?Math.round((accepted/total)*100):null;
  const rejReasons={};
  offers.filter(o=>o.status==='rejected').forEach(o=>{rejReasons[o.rejectionReason]=(rejReasons[o.rejectionReason]||0)+1;});
  let criterion=null,ctype="neutral",cdesc="";
  if(total>=1){
    const dCount=Object.entries(rejReasons).filter(([k])=>k.includes("Desconfianza")).reduce((a,[,v])=>a+v,0);
    const sCount=Object.entries(rejReasons).filter(([k])=>k.includes("seguridad")||k.includes("arraigo")||k.includes("Distancia")).reduce((a,[,v])=>a+v,0);
    if(rate>=50){criterion="PERSEVERAR";ctype="success";cdesc="Más del 50% acepta. Escalar el piloto a más zonas.";}
    else if(sCount>=dCount){criterion="AJUSTAR";ctype="warning";cdesc="El rechazo es por seguridad o arraigo. Iterar el algoritmo de asignación.";}
    else{criterion="PIVOTEAR";ctype="danger";cdesc="El rechazo es por desconfianza. Cambiar la estrategia de adopción.";}
  }
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg}}>
      <div style={{background:C.navy,padding:"12px 16px 14px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,letterSpacing:"0.1em",color:"rgba(255,255,255,0.5)",fontWeight:700,textTransform:"uppercase"}}>Administrador</div>
            <div style={{fontSize:17,fontWeight:800,color:"white"}}>Panel de Control</div>
          </div>
          <button onClick={onLogout} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",fontSize:12,color:"white",cursor:"pointer",fontWeight:700}}>Salir</button>
        </div>
      </div>
      <Scroll>
        {tab==="dashboard"&&(<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[[HISTORIAL_MOCK.length,"Reubicaciones hoy","+12% vs ayer","accent"],[ok,"Exitosas hoy",`${HISTORIAL_MOCK.length-ok} fallidas`,"success"],[ok*30,"Puntos entregados",`${ok}×30 pts`,"info"],[crit.length,"Zonas críticas",`de ${ZONAS.length} totales`,crit.length>0?"danger":"success"]].map(([v,lbl,sub,t])=>(
              <div key={lbl} style={card({padding:"14px 12px"})}>
                <div style={{fontSize:10,color:C.textMid,fontWeight:600,marginBottom:4}}>{lbl}</div>
                <div style={{fontSize:28,fontWeight:900,color:C.text}}>{v}</div>
                <div style={{marginTop:5}}><Badge label={sub} type={t}/></div>
              </div>
            ))}
          </div>
          {crit.length>0&&(
            <div style={{background:C.dangerBg,borderRadius:12,padding:"13px 14px",border:"1px solid rgba(192,16,32,0.18)"}}>
              <div style={{fontSize:12,fontWeight:800,color:C.danger,marginBottom:8}}>⚠ Zonas Críticas</div>
              {crit.map((z,i)=>(
                <div key={z.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<crit.length-1?"1px solid rgba(192,16,32,0.15)":"none"}}>
                  <div><div style={{fontSize:14,fontWeight:800,color:C.danger}}>{z.nombre}</div><div style={{fontSize:11,color:"#B85555"}}>{z.vendedores} vendedores · {z.cupos} cupos</div></div>
                  <Badge label="Crítico" type="danger"/>
                </div>
              ))}
            </div>
          )}
          <Lbl>Ranking Tiendas Ancla</Lbl>
          {ranking.map((t,i)=>(
            <div key={t.id} style={card({padding:"11px 14px"})}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,background:i===0?C.accent:i===1?"#E6EEF6":C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:i===0?"white":i===1?C.navy:C.textLight}}>{i+1}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{t.nombre}</div><div style={{fontSize:11,color:C.textMid}}>{t.direccion} · 🛡 {t.seguridad}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:900,color:C.accent}}>{t.cuposMax-t.cuposDisponibles}</div><div style={{fontSize:10,color:C.textLight}}>en uso</div></div>
              </div>
            </div>
          ))}
        </>)}
        {tab==="piloto"&&(<>
          <div style={{...card(),background:C.navy,padding:"14px 16px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Hipótesis · Iteración 4</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.5}}>"Los comerciantes aceptan reubicarse si el punto es <strong style={{color:"white"}}>seguro</strong> y <strong style={{color:"white"}}>territorialmente cercano</strong>."</div>
          </div>
          <div style={card()}>
            <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:12}}>Embudo de Conversión</div>
            {[[offers.length,"Comerciantes contactados",C.navy],[accepted+rejected,"Tomaron una decisión",C.info],[accepted,"Aceptaron",C.success],[arrived,"Llegaron al punto","#1A8A50"]].map(([v,l,col],i)=>(
              <div key={l} style={{marginBottom:i<3?10:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12,color:C.textMid}}>{l}</span><span style={{fontSize:13,fontWeight:800,color:col}}>{v}</span></div>
                <div style={{height:8,background:C.bg,borderRadius:4,border:`1px solid ${C.border}`,overflow:"hidden"}}><div style={{height:"100%",width:`${offers.length>0?(v/Math.max(offers.length,1))*100:0}%`,background:col,borderRadius:4}}/></div>
              </div>
            ))}
            {offers.length===0&&<div style={{textAlign:"center",padding:"16px 0",fontSize:12,color:C.textLight}}>El fiscalizador debe escanear para ver datos.</div>}
          </div>
          {total>0&&(
            <div style={card()}>
              <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:10}}>Tasa de conversión</div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:42,fontWeight:900,color:rate>=50?C.success:C.danger}}>{rate}%</div><div style={{fontSize:10,color:C.textMid}}>aceptaron</div></div>
                <div style={{flex:1}}>
                  <div style={{height:12,background:C.bg,borderRadius:6,overflow:"hidden",border:`1px solid ${C.border}`,marginBottom:6}}><div style={{height:"100%",width:`${rate}%`,background:rate>=50?C.success:C.danger,borderRadius:6}}/></div>
                  <div style={{display:"flex",gap:8}}>
                    <div style={{flex:1,textAlign:"center",padding:"6px",background:C.successBg,borderRadius:6}}><div style={{fontSize:18,fontWeight:900,color:C.success}}>{accepted}</div><div style={{fontSize:9,color:C.success}}>Aceptaron</div></div>
                    <div style={{flex:1,textAlign:"center",padding:"6px",background:C.dangerBg,borderRadius:6}}><div style={{fontSize:18,fontWeight:900,color:C.danger}}>{rejected}</div><div style={{fontSize:9,color:C.danger}}>Rechazaron</div></div>
                  </div>
                </div>
              </div>
            </div>
          )}
          {criterion&&(
            <div style={{...card(),border:`2px solid ${C[ctype]}`,borderRadius:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C[ctype],textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6}}>Criterio de Decisión</div>
              <div style={{fontSize:22,fontWeight:900,color:C[ctype],marginBottom:6}}>{criterion}</div>
              <div style={{fontSize:13,color:C.textMid,lineHeight:1.5}}>{cdesc}</div>
            </div>
          )}
        </>)}
        {tab==="mapa"&&(<>
          <div style={{...card({padding:0,overflow:"hidden"})}}><HeatMap zones={ZONAS} onZoneClick={()=>{}}/></div>
        </>)}
      </Scroll>
      <BottomNav tabs={[{id:"dashboard",icon:"📊",label:"Dashboard"},{id:"piloto",icon:"🧪",label:"Piloto"},{id:"mapa",icon:"🗺",label:"Mapa"}]} active={tab} onChange={setTab}/>
    </div>
  );
}

function Login({onLogin}){
  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");
  const go=(user,pass)=>{
    if(user==='kiosko'){onLogin('kiosko');return;}
    const v={admin:"123",fiscal:"123",comerciante:"123",ancla:"123"};
    if(v[user.toLowerCase()]===pass){onLogin(user.toLowerCase());}else{setErr("Usuario o contraseña incorrectos");}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,background:C.navy,overflowY:"auto"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 24px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:72,height:72,borderRadius:20,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 10px 32px rgba(232,25,44,0.4)"}}><span style={{fontSize:34,lineHeight:1}}>📍</span></div>
          <div style={{fontSize:28,fontWeight:900,color:"white",letterSpacing:"-0.3px"}}>PuntoLibre</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",marginTop:5}}>Comercio ambulante ordenado y digno</div>
        </div>
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          <input value={u} onChange={e=>{setU(e.target.value);setErr("");}} placeholder="Usuario (admin, fiscal, comerciante, ancla)" style={{background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,padding:"14px 16px",fontSize:13,color:"white",outline:"none",fontFamily:"inherit",width:"100%"}}/>
          <input type="password" value={p} onChange={e=>{setP(e.target.value);setErr("");}} placeholder="Contraseña (123)" onKeyDown={e=>e.key==="Enter"&&go(u,p)} style={{background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,padding:"14px 16px",fontSize:15,color:"white",outline:"none",fontFamily:"inherit",width:"100%"}}/>
          {err&&<div style={{fontSize:12,color:"#FF8090",textAlign:"center"}}>{err}</div>}
          <button onClick={()=>go(u,p)} style={{background:C.accent,color:"white",border:"none",borderRadius:12,padding:"15px",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit",marginTop:4,boxShadow:"0 4px 16px rgba(232,25,44,0.4)"}}>Iniciar Sesión</button>
        </div>
        <div style={{marginTop:24,width:"100%"}}>
          <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:10,letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:700}}>Acceso rápido · clave: 123</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[["Administrador","admin","🏛"],["Fiscalizador","fiscal","👮"],["Comerciante","comerciante","🛒"],["Tienda Ancla","ancla","🏪"]].map(([lbl,role,icon])=>(
              <button key={role} onClick={()=>go(role,"123")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.14)",borderRadius:12,padding:"12px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                <span style={{fontSize:22,lineHeight:1}}>{icon}</span>
                <span style={{fontSize:11,fontWeight:800,color:"white",fontFamily:"inherit"}}>{lbl}</span>
              </button>
            ))}
          </div>
          <button onClick={()=>go('kiosko','')} style={{width:"100%",marginTop:8,background:"rgba(255,255,255,0.05)",border:"1px dashed rgba(255,255,255,0.25)",borderRadius:12,padding:"12px 8px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{fontSize:22}}>🖥️</span>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:12,fontWeight:800,color:"white",fontFamily:"inherit"}}>Terminal Kiosko</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.4)"}}>Búsqueda de QR sin contraseña</div>
            </div>
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[role,setRole]=useState(null);
  const[pilotData,setPilotData]=useState({offers:[]});
  
  const handleOffer=(vendor,tienda)=>{
    const id=`offer_${Date.now()}`;
    setPilotData(p=>({offers:[{id,timestamp:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}),vendor,tienda,status:'pending',rejectionReason:null,decidedAt:null,arrived:false,arrivedAt:null},...p.offers]}));
    return id;
  };

  const injectFakeOffer=()=>{
    const id=`offer_fake_${Date.now()}`;
    setPilotData(p=>({
      offers:[{
        id,
        timestamp:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}),
        vendor:VENDORS[0], 
        tienda:TIENDAS[0], 
        status:'pending', rejectionReason:null, decidedAt:null, arrived:false, arrivedAt:null
      },...p.offers]
    }));
  };

  const handleDecide=(offerId,decision,reason=null)=>{
    setPilotData(p=>({offers:p.offers.map(o=>o.id===offerId?{...o,status:decision,rejectionReason:reason,decidedAt:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}:o)}));
  };
  const handleArrived=(offerId)=>{
    setPilotData(p=>({offers:p.offers.map(o=>o.id===offerId?{...o,arrived:true,arrivedAt:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}:o)}));
  };
  
  const latestOffer=pilotData.offers.find(o=>o.vendor.uid==='v1')||null;
  
  return(
    <div style={{width:"100%",maxWidth:390,height:800,borderRadius:38,overflow:"hidden",boxShadow:"0 24px 60px rgba(15,35,66,0.35),0 0 0 8px rgba(255,255,255,0.12)",background:C.navy,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.navy,height:32,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <span style={{fontSize:11,fontWeight:700,color:"white"}}>9:41</span>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>▂▄▆</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>📶</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.7)"}}>🔋</span>
        </div>
      </div>
      {!role&&<Login onLogin={setRole}/>}
      {role==="fiscal"&&<FiscalizadorView onLogout={()=>setRole(null)} pilotData={pilotData} onOffer={handleOffer}/>}
      {role==="comerciante"&&<ComercianteView onLogout={()=>setRole(null)} latestOffer={latestOffer} onDecide={handleDecide} onArrived={handleArrived} injectFakeOffer={injectFakeOffer}/>}
      {role==="ancla"&&<TiendaAnclaView onLogout={()=>setRole(null)} pilotData={pilotData}/>}
      {role==="admin"&&<AdminView onLogout={()=>setRole(null)} pilotData={pilotData}/>}
      {role==="kiosko"&&<KioskoView onExit={()=>setRole(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
